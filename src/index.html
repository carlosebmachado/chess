<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Game</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="favicon.png">
</head>

<body>
  <div id="container">
    <canvas id="game-canvas"></canvas>
    <div id="sidebar">
      <div id="top-panel" class="player-panel">
        <span class="player-dot"></span>
        <span id="top-label">Black</span>
      </div>
      <div id="top-captured" class="captured-pieces"></div>
      <div id="move-list-container">
        <div id="move-list-header"><span>White</span><span>Black</span></div>
        <div id="move-list"></div>
      </div>
      <div id="game-state"></div>
      <div id="nav-buttons">
        <button id="prev-move-btn">&#9664;</button>
        <button id="next-move-btn">&#9654;</button>
      </div>
      <div id="bottom-panel" class="player-panel">
        <span class="player-dot"></span>
        <span id="bottom-label">White</span>
      </div>
      <div id="bottom-captured" class="captured-pieces"></div>
      <button id="back-to-menu-btn">Back to Menu</button>
    </div>
    <div id="confirm-overlay">
      <div id="confirm-box">
        <p>Return to main menu?</p>
        <div class="confirm-buttons">
          <button id="confirm-yes">Yes</button>
          <button id="confirm-no">No</button>
        </div>
      </div>
    </div>
  </div>
  <div id="menu-overlay">
    <div id="menu-box">
      <h1>♚ Chess</h1>
      <div class="menu-row">
        <label for="mode-select">Mode</label>
        <select id="mode-select">
          <option value="bot">vs Bot</option>
          <option value="2player">2 Players</option>
        </select>
      </div>
      <div class="menu-row" id="color-row">
        <label for="color-select">Play as</label>
        <select id="color-select">
          <option value="white">White</option>
          <option value="black">Black</option>
        </select>
      </div>
      <div class="menu-row" id="engine-row">
        <label for="engine-select">Engine</label>
        <select id="engine-select">
          <option value="ceng">CEng V0</option>
          <option value="geneng">GenEng</option>
        </select>
      </div>
      <div class="menu-row" id="level-row">
        <label for="level-select">Level</label>
        <select id="level-select">
          <option value="1">1 (Easy)</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5" selected>5 (Medium)</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10 (Hard)</option>
        </select>
      </div>
      <button id="start-btn">Start Game</button>
    </div>
  </div>
  <script src="/src/game/Game.js"></script>
  <script src="/src/game/Graphics.js"></script>
  <script src="/src/game/Utils.js"></script>
  <script src="/src/game/Board.js"></script>
  <script src="/src/game/Square.js"></script>
  <script src="/src/game/MoveList.js"></script>
  <script src="/src/game/pieces/Piece.js"></script>
  <script src="/src/game/pieces/Pawn.js"></script>
  <script src="/src/game/pieces/Rook.js"></script>
  <script src="/src/game/pieces/Knight.js"></script>
  <script src="/src/game/pieces/Bishop.js"></script>
  <script src="/src/game/pieces/Queen.js"></script>
  <script src="/src/game/pieces/King.js"></script>
  <script src="/src/game/ui/HUD.js"></script>
  <script src="/src/game/ui/TestAnimation.js"></script>
  <script src="/src/game/engines/CEngV0.js"></script>
  <script src="/src/game/engines/GenEng.js"></script>
  <script src="/src/game/engines/Engine.js"></script>
  <script>
    var canvas = document.getElementById('game-canvas');
    var sidebar = document.getElementById('sidebar');
    var menuOverlay = document.getElementById('menu-overlay');
    var modeSelect = document.getElementById('mode-select');
    var colorSelect = document.getElementById('color-select');
    var colorRow = document.getElementById('color-row');
    var engineSelect = document.getElementById('engine-select');
    var engineRow = document.getElementById('engine-row');
    var levelSelect = document.getElementById('level-select');
    var levelRow = document.getElementById('level-row');
    var startBtn = document.getElementById('start-btn');

    function updateMenu() {
      var isBot = modeSelect.value === 'bot';
      colorRow.style.display = isBot ? '' : 'none';
      engineRow.style.display = isBot ? '' : 'none';
      levelRow.style.display = isBot && engineSelect.value === 'geneng' ? '' : 'none';
    }

    modeSelect.addEventListener('change', updateMenu);
    engineSelect.addEventListener('change', updateMenu);
    updateMenu();

    startBtn.addEventListener('click', function() {
      menuOverlay.style.display = 'none';
      canvas.style.display = 'block';
      sidebar.style.display = 'flex'
      var game = Game.get();
      game.start(canvas, Game.HORIZONTAL_ORIENTATION, {
        mode: modeSelect.value,
        playerColor: colorSelect.value,
        engineType: modeSelect.value === 'bot' ? engineSelect.value : null,
        engineLevel: modeSelect.value === 'bot' && engineSelect.value === 'geneng' ? parseInt(levelSelect.value) : null
      });
      game.run();
    });

    document.getElementById('confirm-yes').addEventListener('click', function() {
      Game.get().backToMenu();
    });

    document.getElementById('confirm-no').addEventListener('click', function() {
      document.getElementById('confirm-overlay').style.display = 'none';
    });

    document.getElementById('back-to-menu-btn').addEventListener('click', function() {
      Game.get().backToMenu();
    });

    document.getElementById('prev-move-btn').addEventListener('click', function() {
      Game.get().board.undoLastMove();
    });

    document.getElementById('next-move-btn').addEventListener('click', function() {
      Game.get().board.redoNextMove();
    });
  </script>
</body>

</html>
